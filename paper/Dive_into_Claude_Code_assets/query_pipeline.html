<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Query Pipeline — Claude Code §4.1</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #faf7f2;
      --color-paper-2: #f2ede4;
      --color-ink:     #1c1917;
      --color-muted:   #57534e;
      --color-soft:    #78716c;
      --color-accent:  #b5523a;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .frame { max-width: 1200px; width: 100%; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-family: var(--font-sans);
      font-size: 0.92rem;
      color: var(--color-muted);
      margin-bottom: 1.5rem;
      max-width: 780px;
    }

    svg { width: 100%; min-width: 960px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · Dive into Claude Code · §4.1</p>
    <h1>The Query Pipeline — one turn of <span style="font-family: var(--font-mono); font-size: 0.82em;">queryLoop()</span></h1>
    <p class="subtitle">Nine fixed stages per turn. Tool-use responses loop back through context assembly; text-only responses terminate the turn.</p>

    <svg viewBox="0 0 1000 880" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#faf7f2"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- ARROWS (drawn first, behind nodes) -->
      <!-- 1 → 2 -->
      <line x1="500" y1="88" x2="500" y2="120" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- 2 → 3 -->
      <line x1="500" y1="176" x2="500" y2="204" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- 3 → 4 -->
      <line x1="500" y1="260" x2="500" y2="288" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- 4 → 5 -->
      <line x1="500" y1="344" x2="500" y2="372" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- 5 → diamond -->
      <line x1="500" y1="428" x2="500" y2="444" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- diamond → Done (NO, right) -->
      <line x1="580" y1="484" x2="660" y2="484" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- diamond → 6 (YES, down) -->
      <line x1="500" y1="524" x2="500" y2="552" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- 6 → 7 -->
      <line x1="500" y1="608" x2="500" y2="636" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- 7 → 8 -->
      <line x1="500" y1="692" x2="500" y2="720" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- 8 → 3 loop-back (coral, agentic cycle) -->
      <polyline points="620,748 900,748 900,232 624,232" fill="none" stroke="#b5523a" stroke-width="1.4" marker-end="url(#arrow-accent)"/>

      <!-- ARROW LABELS (masked) -->
      <!-- NO -->
      <rect x="604" y="474" width="32" height="12" rx="2" fill="#faf7f2"/>
      <text x="620" y="483" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">NO</text>
      <!-- YES -->
      <rect x="484" y="530" width="32" height="12" rx="2" fill="#faf7f2"/>
      <text x="500" y="539" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">YES</text>
      <!-- continue (on coral loop-back) -->
      <rect x="864" y="480" width="72" height="14" rx="2" fill="#faf7f2"/>
      <text x="900" y="490" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">CONTINUE</text>

      <!-- NODES -->

      <!-- 1. Settings resolution (start oval) -->
      <rect x="380" y="40" width="240" height="48" rx="24" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <text x="500" y="60" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">1. Settings resolution</text>
      <text x="500" y="76" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">queryLoop() · destructure immutables</text>

      <!-- 2. Mutable state init -->
      <rect x="380" y="120" width="240" height="56" rx="6" fill="#faf7f2"/>
      <rect x="380" y="120" width="240" height="56" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <text x="500" y="144" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">2. Mutable state init</text>
      <text x="500" y="160" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">State object · 7 continue sites</text>

      <!-- 3. Context assembly (loop target) -->
      <rect x="380" y="204" width="240" height="56" rx="6" fill="#faf7f2"/>
      <rect x="380" y="204" width="240" height="56" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <text x="500" y="228" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">3. Context assembly</text>
      <text x="500" y="244" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">getMessagesAfterCompactBoundary()</text>

      <!-- 4. Pre-model context shapers -->
      <rect x="380" y="288" width="240" height="56" rx="6" fill="#faf7f2"/>
      <rect x="380" y="288" width="240" height="56" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <text x="500" y="312" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">4. Pre-model context shapers</text>
      <text x="500" y="328" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">budget · snip · micro · collapse · auto</text>

      <!-- 5. Model call (FOCAL coral) -->
      <rect x="380" y="372" width="240" height="56" rx="6" fill="#faf7f2"/>
      <rect x="380" y="372" width="240" height="56" rx="6" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1.2"/>
      <text x="500" y="396" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">5. Model call</text>
      <text x="500" y="412" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">for await · deps.callModel()</text>

      <!-- 9. Stop condition (diamond) -->
      <polygon points="500,444 580,484 500,524 420,484" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <text x="500" y="480" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">STEP 9</text>
      <text x="500" y="496" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">tool_use blocks?</text>

      <!-- Done (end oval) -->
      <rect x="660" y="460" width="200" height="48" rx="24" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <text x="760" y="480" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Done</text>
      <text x="760" y="496" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">turn complete · text-only</text>

      <!-- 6. Tool-use dispatch -->
      <rect x="380" y="552" width="240" height="56" rx="6" fill="#faf7f2"/>
      <rect x="380" y="552" width="240" height="56" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <text x="500" y="576" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">6. Tool-use dispatch</text>
      <text x="500" y="592" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">orchestration · §4.2</text>

      <!-- 7. Permission gate -->
      <rect x="380" y="636" width="240" height="56" rx="6" fill="#faf7f2"/>
      <rect x="380" y="636" width="240" height="56" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <text x="500" y="660" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">7. Permission gate</text>
      <text x="500" y="676" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">deny-first · §5</text>

      <!-- 8. Tool execution & results -->
      <rect x="380" y="720" width="240" height="56" rx="6" fill="#faf7f2"/>
      <rect x="380" y="720" width="240" height="56" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <text x="500" y="744" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">8. Tool execution &amp; results</text>
      <text x="500" y="760" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">tool_result → conversation</text>

      <!-- LEGEND -->
      <line x1="40" y1="816" x2="960" y2="816" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>
      <text x="40" y="832" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND · SHAPE CARRIES TYPE</text>

      <rect x="40" y="848" width="24" height="12" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <text x="72" y="858" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Start / end (oval)</text>

      <rect x="220" y="848" width="24" height="12" rx="2" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <text x="252" y="858" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Process step (rectangle)</text>

      <polygon points="428,854 440,848 452,854 440,860" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <text x="464" y="858" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Decision (diamond)</text>

      <rect x="604" y="848" width="24" height="12" rx="2" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <text x="636" y="858" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Focal step</text>

      <line x1="748" y1="856" x2="776" y2="856" stroke="#b5523a" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="784" y="858" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Agentic loop</text>
    </svg>
  </div>
</body>
</html>
